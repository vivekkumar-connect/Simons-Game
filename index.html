<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./main.css" />
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>
<body>
    <section></section>
    <button class="help-icon" popovertarget="help-details">?</button>
    <div id="help-details" popover>
        <h3>SIMON SAYS</h3>
        <br>
        <p>1. Memorize the flashing colors.<br>
            2. Repeat them in the same order.<br>
            3. Every round adds a new color.</br>
            4. One mistake = Game Over.<br>
            5. How many rounds can you survive?
        </p>
    </div>
    <div class="heading">
        <h1 class="game-heading">Press 'Play' to start</h1>
        <h1 class="round-count"></h1>
    </div>
    <section></section>
    <div class="color-button-container">
        <div class="button" id="green"></div>
        <div class="button" id="red"></div>
        <div class="button" id="yellow"></div>
        <div class="button" id="blue"></div>
    </div>
    <section></section>
    <div class="play-button">Play</div>
    <section></section>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./index.js"></script>
</body>
</html>
